<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papatoetoe Toastmasters Timer</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Avenir Next', Avenir, sans-serif;
        }
        body {
            background-color: #212121;
            color: white;
            margin: 0;
            padding: 0;
            transition: background-color 0.2s;
            min-height: 100vh;
        }
        
        /* Blinking Animations for Backgrounds */
        @keyframes blinkGreen {
            0%, 100% { background-color: #4CAF50; color: white; }
            50% { background-color: #212121; color: white; }
        }
        @keyframes blinkyellow {
            0%, 100% { background-color: #FF9800; color: black; }
            50% { background-color: #212121; color: white; }
        }
        @keyframes blinkRed {
            0%, 100% { background-color: #F44336; color: white; }
            50% { background-color: #212121; color: white; }
        }
        
        /* Text Blinking Animation for Stop Action (2 Seconds) */
        @keyframes textBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        .text-blink { animation: textBlink 1s ease 2; } /* blinks twice over 2 seconds */

        /* Solid Stage Colors */
        body.stage-green { background-color: #4CAF50 !important; color: white; }
        body.stage-yellow { background-color: #FF9800 !important; color: black; }
        body.stage-red { background-color: #F44336 !important; color: white; }

        /* Blinking Stage Colors */
        body.blink-green { animation: blinkGreen 1s infinite; }
        body.blink-yellow { animation: blinkyellow 1s infinite; }
        body.blink-red { animation: blinkRed 1s infinite; }

        /* Sticky Timer */
        #top-section {
            position: sticky;
            top: 0;
            background-color: inherit;
            padding: 20px;
            z-index: 100;
            border-bottom: 2px solid rgba(255,255,255,0.1);
            text-align: center;
        }
        h1 {
            font-size: 18px;
            margin: 0 0 10px 0;
            opacity: 0.8;
        }
        #timerDisplay {
            font-size: 80px;
            font-weight: bold;
            font-variant-numeric: tabular-nums;
            margin: 0;
            transition: opacity 0.2s;
        }

        /* Controls */
        #content {
            padding: 15px;
            max-width: 500px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        /* Compact Settings Grid */
        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr 1fr;
            align-items: center;
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            row-gap: 12px;
        }
        .grid-header {
            font-size: 14px;
            opacity: 0.7;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .stage-label {
            font-weight: bold;
            font-size: 16px;
        }
        .time-inputs {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
        }
        
        select {
            font-size: 16px;
            padding: 4px 6px;
            border-radius: 6px;
            background: #333;
            color: white;
            border: 1px solid #555;
            appearance: none;
            text-align: center;
            width: 55px;
        }
        input[type="checkbox"] {
            transform: scale(1.3);
            cursor: pointer;
        }
        
        .buttons {
            display: flex;
            gap: 15px;
        }
        .buttons button {
            flex: 1; /* Equal sizes */
            padding: 15px;
            font-size: 20px;
            border: 3px solid white; /* Medium thickness white border */
            border-radius: 10px;
            cursor: pointer;
            color: white;
            font-weight: bold;
        }
        #startBtn { background-color: #4CAF50; }
        #stopBtn { background-color: #F44336; }
        
        .bottom-actions {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            margin-top: 10px;
            gap: 5px;
        }
        #resetBtn { 
            background-color: #616161; 
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            font-weight: bold;
        }
        .note-text {
            font-size: 12px;
            color: #AAAAAA;
        }
        .note-text a {
            color: #4CAF50;
            text-decoration: none;
        }
        .note-text a:hover {
            text-decoration: underline;
        }

        /* Logs */
        #logSection {
            margin-top: 10px;
            border-top: 1px solid #444;
            padding-top: 10px;
        }
        .log-header-text {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #AAAAAA;
        }
        .log-entry {
            padding: 12px 10px;
            border-bottom: 1px solid #444;
            font-size: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .log-details {
            font-size: 14px;
            opacity: 0.8;
            margin-top: 4px;
        }
        .editable-name {
            font-weight: bold;
            border-bottom: 1px dashed rgba(255,255,255,0.4);
            padding-bottom: 2px;
            cursor: text;
            display: inline-block;
            min-width: 100px;
            outline: none;
        }
        .editable-name:focus {
            border-bottom: 1px solid white;
            background: rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <div id="top-section">
        <h1>Papatoetoe Toastmasters Timer</h1>
        <div id="timerDisplay">00:00</div>
    </div>

    <div id="content">
        <!-- Compact Table Grid for Space Saving -->
        <div class="settings-grid">
            <div class="grid-header">Stage</div>
            <div class="grid-header">Time(Minutes:Seconds)</div>
            <div class="grid-header">Blink</div>
            <div class="grid-header">Sound</div>

            <!-- Green Row -->
            <div class="stage-label" style="color: #4CAF50;">Green</div>
            <div class="time-inputs">
                <select id="greenMin"></select>:<select id="greenSec"></select>
            </div>
            <div><input type="checkbox" id="greenBlink"></div>
            <div><input type="checkbox" id="greenSound"></div>

            <!-- yellow Row -->
            <div class="stage-label" style="color: #FF9800;">yellow</div>
            <div class="time-inputs">
                <select id="yellowMin"></select>:<select id="yellowSec"></select>
            </div>
            <div><input type="checkbox" id="yellowBlink"></div>
            <div><input type="checkbox" id="yellowSound"></div>

            <!-- Red Row -->
            <div class="stage-label" style="color: #F44336;">Red</div>
            <div class="time-inputs">
                <select id="redMin"></select>:<select id="redSec"></select>
            </div>
            <div><input type="checkbox" id="redBlink"></div>
            <div><input type="checkbox" id="redSound"></div>
        </div>

        <div class="buttons">
            <button id="startBtn" onclick="startTimer()">Start</button>
            <button id="stopBtn" onclick="stopTimer()">Stop</button>
        </div>
        
        <div class="bottom-actions">
            <button id="resetBtn" onclick="resetTimer()">Reset</button>
            <div class="note-text">(sound works on Chrome browser and not silent mode)</div>
            <div class="note-text">for feedbacks email <a href="mailto:alexkurian@live.com">alexkurian@live.com</a></div>
        </div>

        <div id="logSection">
            <div class="log-header-text">Timing Logs</div>
            <div id="logTable"></div>
        </div>
    </div>

    <script>
        let running = false;
        let isStopping = false; // prevents duplicate stop button clicks
        let startTime = null;
        let startClockDate = null;
        let timerInterval = null;
        let logs = [];
        let speakerCount = 0;
        let wakeLock = null; // Screen keep-awake feature

        // Audio Context for the buzzer
        let audioCtx = null;
        
        // Sound Trigger States
        let greenSoundPlayed = false;
        let yellowSoundPlayed = false;
        let redSoundPlayed = false;
        let lastRedBuzzerTime = 0;

        // Setup the iOS-style dial dropdowns
        function setupPickers() {
            const selects = document.querySelectorAll('select');
            selects.forEach(select => {
                const isMin = select.id.includes('Min');
                const max = isMin ? 60 : 59;
                for (let i = 0; i <= max; i++) {
                    let opt = document.createElement('option');
                    opt.value = i;
                    opt.text = i.toString().padStart(2, '0');
                    select.appendChild(opt);
                }
            });
            // Default Values
            document.getElementById('greenMin').value = "1";
            document.getElementById('yellowMin').value = "5";
            document.getElementById('redMin').value = "7";
        }
        setupPickers();

        function getSeconds(minId, secId) {
            return (parseInt(document.getElementById(minId).value) * 60) + parseInt(document.getElementById(secId).value);
        }
        
        // Format AM/PM Time (12-hour clock)
        function formatClockTime(dateObj) {
            let hh = dateObj.getHours();
            let mm = dateObj.getMinutes().toString().padStart(2, '0');
            const ampm = hh >= 12 ? 'PM' : 'AM';
            hh = hh % 12;
            hh = hh ? hh : 12; // 0 becomes 12
            return `${hh}:${mm} ${ampm}`;
        }

        // Keep Screen Awake Function
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) {
                console.log('Wake Lock Error:', err.message);
            }
        }
        // Re-request wake lock when returning to the tab
        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible') {
                requestWakeLock();
            }
        });

        // Web Audio API Buzzer Function
        function playBuzzer() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.type = 'square'; // Buzzer-like sound
            oscillator.frequency.setValueAtTime(440, audioCtx.currentTime); // 440 Hz
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime); // Volume
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.start();
            setTimeout(() => oscillator.stop(), 500); // Plays for 0.5 seconds
        }

        function startTimer() {
            requestWakeLock(); // Trigger keep screen awake

            if (!running && !isStopping) {
                // Initialize audio context on first user interaction to bypass browser restrictions
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                
                running = true;
                startTime = Date.now();
                startClockDate = new Date();
                
                // Reset sound states for the new speaker
                greenSoundPlayed = false;
                yellowSoundPlayed = false;
                redSoundPlayed = false;
                lastRedBuzzerTime = 0;
                
                document.body.className = '';
                timerInterval = setInterval(updateTimer, 100); 
            }
        }

        function stopTimer() {
            if (running && !isStopping) {
                running = false;
                isStopping = true; // Lock timer state during the stop animation
                clearInterval(timerInterval);
                
                // Remove background blinking immediately
                document.body.className = ''; 

                const endClockDate = new Date();
                const elapsedSeconds = (Date.now() - startTime) / 1000;
                const m = Math.floor(elapsedSeconds / 60);
                const s = Math.floor(elapsedSeconds % 60);
                
                // Format xx minutes : xx seconds for the log
                const elapsedStrForLog = `${m.toString().padStart(2, '0')} minutes : ${s.toString().padStart(2, '0')} seconds`;
                
                let colorHex = '#BBBBBB';
                if (elapsedSeconds >= getSeconds('redMin', 'redSec')) colorHex = '#F44336';
                else if (elapsedSeconds >= getSeconds('yellowMin', 'yellowSec')) colorHex = '#FF9800';
                else if (elapsedSeconds >= getSeconds('greenMin', 'greenSec')) colorHex = '#4CAF50';

                speakerCount++;
                const timeFrame = `${formatClockTime(startClockDate)} - ${formatClockTime(endClockDate)}`;
                
                logs.unshift({ 
                    title: `Speaker ${speakerCount}`, 
                    timeFrame: timeFrame,
                    duration: elapsedStrForLog,
                    color: colorHex 
                });
                
                updateLogDisplay();

                // Blink numbers for 2 seconds -> Reset Screen
                const display = document.getElementById('timerDisplay');
                display.classList.add('text-blink'); // Start text blinking animation
                
                setTimeout(() => {
                    display.innerText = '00:00';
                    display.classList.remove('text-blink');
                    isStopping = false; // Unlock timer
                }, 2000); // 2 seconds
            }
        }

        function resetTimer() {
            const userConfirmed = confirm("Make sure to write down timing log before resetting. Proceed with reset? Yes or No");
            
            if (userConfirmed) {
                running = false;
                isStopping = false;
                clearInterval(timerInterval);
                
                const display = document.getElementById('timerDisplay');
                display.innerText = '00:00';
                display.classList.remove('text-blink');
                document.body.className = '';
                
                // Reset Logs
                logs = [];
                speakerCount = 0;
                updateLogDisplay();
                
                // Reset pickers to default
                document.getElementById('greenMin').value = "1";
                document.getElementById('greenSec').value = "0";
                document.getElementById('yellowMin').value = "5";
                document.getElementById('yellowSec').value = "0";
                document.getElementById('redMin').value = "7";
                document.getElementById('redSec').value = "0";
                
                // Uncheck all toggles
                document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
            }
        }

        function updateTimer() {
            const elapsed = (Date.now() - startTime) / 1000;
            const m = Math.floor(elapsed / 60);
            const s = Math.floor(elapsed % 60);
            
            document.getElementById('timerDisplay').innerText = 
                `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;

            const green = getSeconds('greenMin', 'greenSec');
            const yellow = getSeconds('yellowMin', 'yellowSec');
            const red = getSeconds('redMin', 'redSec');

            document.body.className = '';
            
            if (elapsed >= red) {
                document.body.classList.add(document.getElementById('redBlink').checked ? 'blink-red' : 'stage-red');
                
                if (!redSoundPlayed) {
                    if(document.getElementById('redSound').checked) playBuzzer();
                    redSoundPlayed = true;
                    lastRedBuzzerTime = Math.floor(elapsed);
                } 
                else if (Math.floor(elapsed) - lastRedBuzzerTime >= 10) {
                    if(document.getElementById('redSound').checked) playBuzzer();
                    lastRedBuzzerTime = Math.floor(elapsed);
                }
                
            } else if (elapsed >= yellow) {
                document.body.classList.add(document.getElementById('yellowBlink').checked ? 'blink-yellow' : 'stage-yellow');
                
                if (!yellowSoundPlayed) {
                    if(document.getElementById('yellowSound').checked) playBuzzer();
                    yellowSoundPlayed = true;
                }
                
            } else if (elapsed >= green) {
                document.body.classList.add(document.getElementById('greenBlink').checked ? 'blink-green' : 'stage-green');
                
                if (!greenSoundPlayed) {
                    if(document.getElementById('greenSound').checked) playBuzzer();
                    greenSoundPlayed = true;
                }
            }
        }

        // Save edited name back to the array so it isn't overwritten on next timer update
        function saveEditedName(index, element) {
            logs[index].title = element.innerText;
        }

        function updateLogDisplay() {
            const logContainer = document.getElementById('logTable');
            logContainer.innerHTML = '';
            logs.forEach((log, index) => {
                const div = document.createElement('div');
                div.className = 'log-entry';
                div.style.color = log.color;
                
                div.innerHTML = `
                    <div>
                        <div class="editable-name" contenteditable="true" onblur="saveEditedName(${index}, this)" spellcheck="false">${log.title}</div>
                        <div class="log-details">${log.timeFrame}</div>
                    </div>
                    <div>${log.duration}</div>
                `;
                
                logContainer.appendChild(div);
            });
        }
    </script>
</body>
</html>
